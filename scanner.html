<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    .header {
      text-align: center;
      padding: 15px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      width: 75px;
      height: 75px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 15px;
      max-width: 1000px;
      margin: auto;
      padding: 15px;
    }

    .left, .right { flex: 1; }

    .card {
      background: #111827;
      padding: 15px;
      border-radius: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #result {
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.jpeg" class="logo">
  <div class="title">KLT FRUITS, INC. MAIN GATE ATTENDANCE SYSTEM</div>
  <div id="userRole" style="font-size:18px; color:#93c5fd;"></div>

  <button onclick="logout()" style="margin-top:10px; width:120px;">
    Logout
  </button>
</div>

<div class="container">

  <div class="left">
    <div class="card">
      <button onclick="startScanner()">START SCANNER</button>
      <div id="reader"></div>
    </div>
  </div>

  <div class="right">
    <div class="card">
      <div id="result">Waiting for scan...</div>
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyycblJBbdw8QOQWFs4AGn-iUreg8knsaRND9IZcogLMNeYrh1HAWb7Zf0Hu1lYBfzJuw/exec";

let scanner;
let busy = false;
let scannerStarted = false;

/* 🔐 CHECK LOGIN */
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "login.html";
} else {
  window.onload = () => {
    document.getElementById("userRole").innerText =
      "Logged in as: " + user.username + " (" + user.role + ")";
  };
}

/* LOGOUT */
function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

/* SCANNER */
function startScanner() {

  if (scannerStarted) return;
  scannerStarted = true;

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    let cameraId = devices[0].id;

    devices.forEach(d => {
      if (d.label.toLowerCase().includes("back")) {
        cameraId = d.id;
      }
    });

    scanner.start(
      cameraId,
      { fps: 10, qrbox: 250 },

      (decodedText) => {

        if (busy) return;
        busy = true;

        const empId = decodedText.trim();

        document.getElementById("result").innerHTML =
          "<h3>Processing: " + empId + "</h3>";

        fetch(SCRIPT_URL, {
          method: "POST",
          body: empId,
          headers: { "Content-Type": "text/plain" }
        })
        .then(res => res.json())
        .then(data => {

          document.getElementById("result").innerHTML = `
            <div style="line-height:1.8">

              <div style="font-size:32px; font-weight:bold; color:#60a5fa">
                ${data.status}
              </div>

              <div style="font-size:28px; font-weight:bold;">
                ${data.name}
              </div>

              <div style="font-size:24px; color:#cbd5e1">
                ${data.department}
              </div>

              <div style="margin-top:20px; font-weight:bold; color:${data.schedule === "WITH SCHEDULE" ? "#16a34a" : "#dc2626"}">
                ${data.schedule}
              </div>

              <div style="margin-top:8px; font-size:20px; color:#94a3b8">
                ${data.time}
              </div>

            </div>
          `;

          setTimeout(() => {
            busy = false;
            document.getElementById("result").innerText = "Waiting for scan...";
          }, 5000);

        });

      }

    );

  });

}
</script>

</body>
</html>
